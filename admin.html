ateY(130px);opacity:0;transition:.25s;font-weight:900;z-index:90}.toast.show{transform:none;opacity:1}.modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,38,55,.74);z-index:80;padding:18px}.modal.active{display:grid}.modal-card{width:min(780px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:25px;box-shadow:var(--shadow);padding:22px}.x{border:0;background:#eef3f6;border-radius:10px;width:38px;height:38px;font-size:1.2rem;cursor:pointer}@media(max-width:820px){.g4,.g2{grid-template-columns:1fr}.space{align-items:stretch;flex-direction:column}.row>*{width:100%}}

</div>
<div class="modal" id="editModal"><div class="modal-card"><div class="row space"><h2>Edit question</h2><button class="x" id="closeModal">×</button></div><label>Question</label><input id="mText"><label>Replace image optional</label><label class="upload">📸 Choose new image<input id="mFile" type="file" accept="image/*"></label><div id="mPrev"></div><label><input id="mRemovePhoto" type="checkbox" style="width:auto"> Remove image</label><label>Answers</label><div class="grid g2" id="mAnswers"></div><div class="row" style="margin-top:16px"><button class="btn primary grow" id="saveModal">Save changes</button><button class="btn soft" id="cancelModal">Cancel</button></div></div></div><div class="toast" id="toast"></div>

const firebaseConfig={apiKey:"AIzaSyCm12-J2SiwF2Sn0ETOMeke-bSAI5CFA-o",authDomain:"rachel-ethan-baby-shower.firebaseapp.com",databaseURL:"https://rachel-ethan-baby-shower-default-rtdb.firebaseio.com",projectId:"rachel-ethan-baby-shower",storageBucket:"rachel-ethan-baby-shower.firebasestorage.app",messagingSenderId:"126245184635",appId:"1:126245184635:web:9fec26e83cd40c338eede"};firebase.initializeApp(firebaseConfig);const db=firebase.database(),fs=firebase.firestore();const $=id=>document.getElementById(id);let qPhoto=null,pPhoto=null,mPhoto=null,editingId=null,questions=[],photos=[],settings={title:"Rachel & Ethan's Baby Shower",timer:15,perGame:5,photoTime:5},state=null,players=[];
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function displayName(n){n=String(n||'').trim();return(!n||n==='undefined'||n==='null')?'Sea Guest':n}function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2400)}function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function clamp(v,a,b,f){v=Number(v);return Number.isFinite(v)?Math.min(b,Math.max(a,v)):f}
let acx=null;function ac(){if(!acx)acx=new (window.AudioContext||window.webkitAudioContext)();if(acx.state==='suspended')acx.resume();return acx}function tone(f,d=.09,type='sine',g=.04,delay=0){const a=ac(),o=a.createOscillator(),v=a.createGain(),t=a.currentTime+delay;o.type=type;o.frequency.value=f;v.gain.setValueAtTime(.0001,t);v.gain.exponentialRampToValueAtTime(g,t+.01);v.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(v);v.connect(a.destination);o.start(t);o.stop(t+d+.03)}window.sb=n=>{if(n==='drum'){for(let i=0;i<10;i++)tone(120+i*8,.045,'square',.018,i*.055)}if(n==='aww'){tone(392,.18,'sine',.035);tone(330,.28,'sine',.03,.16)}if(n==='splash'){tone(700,.05,'triangle',.03);tone(420,.08,'triangle',.025,.05);tone(240,.14,'sine',.03,.1)}if(n==='trombone'){[330,311,294,262].forEach((f,i)=>tone(f,.22,'sawtooth',.022,i*.18))}if(n==='cheer'){[523,659,784,1046,1318].forEach((f,i)=>tone(f,.14,'triangle',.04,i*.08))}}
function img(file,cb){if(!file)return cb(null);const im=new Image(),url=URL.createObjectURL(file);im.onload=()=>{try{let w=im.width,h=im.height;const sc=Math.min(1,1200/Math.max(w,h));w=Math.max(1,Math.round(w*sc));h=Math.max(1,Math.round(h*sc));const c=document.createElement('canvas');let q=.86;const draw=()=>{c.width=w;c.height=h;c.getContext('2d').drawImage(im,0,0,w,h);return c.toDataURL('image/jpeg',q)};let out=draw();while(out.length>900000&&q>.45){q-=.12;out=draw()}let n=0;while(out.length>950000&&n<3){n++;w=Math.round(w*.78);h=Math.round(h*.78);q=.72;out=draw()}URL.revokeObjectURL(url);if(out.length>1000000){toast('Image too large even after compression');return cb(null)}cb(out)}catch(e){URL.revokeObjectURL(url);toast('Could not process image');cb(null)}};im.onerror=()=>{URL.revokeObjectURL(url);toast('Could not read image');cb(null)};im.src=url}
function wire(){$('urls').innerHTML=`Guest: ${location.origin+location.pathname.replace('admin.html','index.html')}<br>Host: ${location.origin+location.pathname.replace('admin.html','index.html')}?host=123<br>Screen: ${location.origin+location.pathname.replace('admin.html','index.html')}?screen=1`;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active')});buildAnswers();buildModal();$('clearQ').onclick=clearForm;$('saveQ').onclick=saveQ;$('defaults').onclick=loadDefaults;$('search').oninput=renderQ;$('qFile').onchange=e=>img(e.target.files[0],d=>{qPhoto=d;$('qPrev').innerHTML=d?`<img class="preview" src="${d}">`:''});$('pFile').onchange=e=>img(e.target.files[0],d=>{pPhoto=d;$('pPrev').innerHTML=d?`<img class="preview" src="${d}">`:''});$('saveP').onclick=saveP;$('saveSet').onclick=()=>saveSettings();$('start').onclick=startGame;$('reset').onclick=resetGame;$('advance').onclick=manualAdvance;$('clearPlayers').onclick=clearPlayers;$('forceLobby').onclick=()=>db.ref('gameState').set({phase:'lobby',currentQuestion:0,photoIndex:0,selectedIds:null});$('mFile').onchange=e=>img(e.target.files[0],d=>{mPhoto=d;$('mRemovePhoto').checked=false;modalPrev()});$('closeModal').onclick=$('cancelModal').onclick=closeEdit;$('saveModal').onclick=saveEdit;document.addEventListener('keydown',e=>{if(e.key==='Escape')closeEdit()});
fs.collection('questions').orderBy('order').onSnapshot(s=>{questions=s.docs.map(d=>({id:d.id,...d.data()}));$('sQ').textContent=questions.length;$('qBadge').textContent=questions.length;renderQ()});fs.collection('photos').orderBy('order').onSnapshot(s=>{photos=s.docs.map(d=>({id:d.id,...d.data()}));$('sP').textContent=photos.length;renderP()});fs.collection('config').doc('settings').onSnapshot(d=>{if(d.exists){settings={...settings,...d.data()};$('setTitle').value=settings.title;$('setTimer').value=settings.timer;$('setPer').value=settings.perGame;$('setPhoto').value=settings.photoTime}else saveSettings(true)});db.ref('players').on('value',s=>{players=Object.entries(s.val()||{}).map(([id,v])=>({id,...v}));$('sPlayers').textContent=players.filter(x=>!x.isHost).length;renderLive();renderPhase()});db.ref('gameState').on('value',s=>{state=s.val();renderPhase()})}
function buildAnswers(){const box=$('answerInputs');box.innerHTML='';for(let i=0;i<4;i++){const d=document.createElement('label');d.style.cssText='display:flex;align-items:center;gap:8px;margin:0';d.innerHTML=`<input type="radio" name="correct" value="${i}" ${i===0?'checked':''} style="width:auto"><input id="a${i}" placeholder="Answer ${'ABCD'[i]}">`;box.appendChild(d)}}function buildModal(){const box=$('mAnswers');box.innerHTML='';for(let i=0;i<4;i++){const d=document.createElement('label');d.style.cssText='display:flex;align-items:center;gap:8px;margin:0';d.innerHTML=`<input type="radio" name="mCorrect" value="${i}" ${i===0?'checked':''} style="width:auto"><input id="mA${i}" placeholder="Answer ${'ABCD'[i]}">`;box.appendChild(d)}}function clearForm(){$('qText').value='';for(let i=0;i<4;i++)$('a'+i).value='';document.querySelector('input[name=correct][value="0"]').checked=true;qPhoto=null;$('qPrev').innerHTML='';$('qFile').value=''}function pack(ans){return[ans[0],ans[1],ans[2]||ans[0],ans[3]||ans[1]]}
function saveQ(){const text=$('qText').value.trim(),ans=[0,1,2,3].map(i=>$('a'+i).value.trim()),correct=Number(document.querySelector('input[name=correct]:checked').value);if(!text||!ans[0]||!ans[1])return toast('Need question + two answers');const data={text,answers:pack(ans),correctIndex:correct,order:Date.now()};if(qPhoto)data.photoURL=qPhoto;fs.collection('questions').add(data).then(()=>{clearForm();toast('Question added')}).catch(()=>toast('Save failed'))}
function renderQ(){const term=($('search').value||'').toLowerCase();$('qList').innerHTML=questions.length?questions.filter(q=>q.text.toLowerCase().includes(term)).map((q,i)=>`<div class="item"><div class="row space"><b>Q${i+1}</b><span class="row"><button class="btn small soft" onclick="moveQ('${q.id}',-1)">↑</button><button class="btn small soft" onclick="moveQ('${q.id}',1)">↓</button><button class="btn small dark" onclick="editQ('${q.id}')">Edit</button><button class="btn small red" onclick="delQ('${q.id}')">Delete</button></span></div><div class="q">${esc(q.text)}</div>${q.photoURL?`<img class="preview" src="${q.photoURL}">`:''}<div class="answers">${q.answers.map((a,j)=>`<span class="pill ${j===q.correctIndex?'ok':''}">${j===q.correctIndex?'✓ ':''}${esc(a)}</span>`).join('')}</div></div>`).join(''):'<div class="empty">No questions yet.</div>'}
window.moveQ=(id,dir)=>{const i=questions.findIndex(q=>q.id===id),j=i+dir;if(i<0||j<0||j>=questions.length)return;const b=fs.batch();b.update(fs.collection('questions').doc(questions[i].id),{order:questions[j].order});b.update(fs.collection('questions').doc(questions[j].id),{order:questions[i].order});b.commit()};window.delQ=id=>{if(confirm('Delete question?'))fs.collection('questions').doc(id).delete().then(()=>toast('Deleted'))};window.editQ=id=>{const q=questions.find(x=>x.id===id);if(!q)return;editingId=id;mPhoto=null;$('mText').value=q.text;q.answers.forEach((a,i)=>$('mA'+i).value=a);document.querySelector(`input[name=mCorrect][value="${q.correctIndex}"]`).checked=true;$('mFile').value='';$('mRemovePhoto').checked=false;modalPrev(q.photoURL);$('editModal').classList.add('active')};function modalPrev(existing){const src=mPhoto||existing;$('mPrev').innerHTML=src?`<img class="preview" src="${src}">`:'<p class="muted">No image</p>'}function closeEdit(){editingId=null;mPhoto=null;$('editModal').classList.remove('active')}function saveEdit(){const text=$('mText').value.trim(),ans=[0,1,2,3].map(i=>$('mA'+i).value.trim()),correct=Number(document.querySelector('input[name=mCorrect]:checked').value);if(!text||!ans[0]||!ans[1])return toast('Need question + two answers');const data={text,answers:pack(ans),correctIndex:correct};if(mPhoto)data.photoURL=mPhoto;if($('mRemovePhoto').checked)data.photoURL=firebase.firestore.FieldValue.delete();fs.collection('questions').doc(editingId).set(data,{merge:true}).then(()=>{closeEdit();toast('Saved')}).catch(()=>toast('Save failed'))}
function saveP(){if(!pPhoto)return toast('Choose a photo');fs.collection('photos').add({url:pPhoto,caption:$('pCaption').value.trim(),order:Date.now()}).then(()=>{pPhoto=null;$('pPrev').innerHTML='';$('pFile').value='';$('pCaption').value='';toast('Photo added')}).catch(()=>toast('Photo save failed'))}function renderP(){$('pList').innerHTML=photos.length?photos.map(p=>`<div class="item photo"><div class="row space"><b>Photo</b><button class="btn small red" onclick="delP('${p.id}')">Delete</button></div><img class="preview" src="${p.url}"><div>${esc(p.caption||'')}</div></div>`).join(''):'<div class="empty">No photos yet.</div>'}window.delP=id=>{if(confirm('Delete photo?'))fs.collection('photos').doc(id).delete().then(()=>toast('Deleted'))};
function saveSettings(silent){settings={title:$('setTitle').value.trim()||settings.title,timer:clamp($('setTimer').value,5,60,15),perGame:clamp($('setPer').value,3,50,5),photoTime:clamp($('setPhoto').value,3,30,5)};fs.collection('config').doc('settings').set(settings).then(()=>{if(!silent)toast('Settings saved')})}
function loadDefaults(){if(!confirm('Replace questions with defaults?'))return;const defs=[["Most popular baby boy name of all time (Western countries)?",["Michael","John","James","Robert"],2],["How many bones are babies born with? (Adults have 206)",["270-300","200-250","310-340","350-380"],0],["Which month has the highest number of birthdays worldwide?",["December","April","May","August"],3],["How many times is the word \"baby\" sung in Justin Bieber's \"Baby\"?",["62","55","44","70"],1],["First colours/shades a baby can see?",["Black, red and green","Black, white and red","Red, yellow and blue","Black, white and blue"],1],["Valentina Vassilyeva's record for most babies birthed (1725-1765)?",["58","50","32","69"],3],["When does a baby develop fingerprints?",["3 months in pregnancy","6 months in pregnancy","3 months after birth","6 months after birth"],0],["What animal commonly gives birth to twins?",["Kangaroos","Elephants","Pandas","Rhinos"],2],["What can a baby do up until 7 months that an adult cannot?",["Sleep with eyes open","Breathe and swallow at the same time","Know time in windowless room","Control body temperature"],1],["What singer played her own music in the delivery room for her twins' birth?",["Jennifer Lopez","Christina Aguilera","Beyoncé","Mariah Carey"],3],["What do you call a baby crocodile?",["Kit","Hatchling","Pup","Puggle"],1],["Heaviest weight recorded for a baby born naturally (1955, Italian woman)?",["19 lbs","15 lbs","22 lbs","28 lbs"],2]];fs.collection('questions').get().then(s=>{const b=fs.batch();s.forEach(d=>b.delete(d.ref));defs.forEach((d,i)=>b.set(fs.collection('questions').doc(),{text:d[0],answers:d[1],correctIndex:d[2],order:i+1}));return b.commit()}).then(()=>toast('Defaults loaded'))}
function selectedList(st){const ids=st&&st.selectedIds;if(!ids)return questions;const by=Object.fromEntries(questions.map(q=>[q.id,q]));const arr=Array.isArray(ids)?ids:Object.keys(ids).sort((a,b)=>Number(a)-Number(b)).map(k=>ids[k]);return arr.map(id=>by[id]).filter(Boolean)}
function resetPlayers(){return db.ref('players').once('value').then(s=>{const u={};s.forEach(c=>{if(c.key==='null'){u[c.key]=null;return}u[c.key+'/score']=0;u[c.key+'/answered']=false;u[c.key+'/lastAnswer']=null;u[c.key+'/lastCorrect']=null;u[c.key+'/answerAt']=null;u[c.key+'/streak']=0});return db.ref('players').update(u)})}
function startGame(){if(!questions.length)return toast('Add questions first');const chosen=shuffle(questions).slice(0,Math.min(settings.perGame,questions.length));resetPlayers().then(()=>db.ref('gameState').set({phase:'countdown',countdownEnd:Date.now()+3400,currentQuestion:0,questionDuration:settings.timer,totalQuestions:chosen.length,selectedIds:chosen.map(q=>q.id),photoIndex:0})).then(()=>toast('Countdown started'))}
function resetGame(){if(!confirm('Reset to lobby and clear scores?'))return;resetPlayers().then(()=>db.ref('gameState').set({phase:'lobby',currentQuestion:0,photoIndex:0,selectedIds:null})).then(()=>toast('Back to lobby'))}
function clearAnswered(){return db.ref('players').once('value').then(s=>{const u={};s.forEach(c=>{if(c.key==='null'){u[c.key]=null;return}u[c.key+'/answered']=false;u[c.key+'/lastAnswer']=null;u[c.key+'/lastCorrect']=null;u[c.key+'/answerAt']=null});return db.ref('players').update(u)})}
function manualAdvance(){if(!state)return toast('No game state');const st=state;if(st.phase==='countdown')return db.ref('gameState').update({phase:'playing',questionStartTime:Date.now(),questionDuration:st.questionDuration||settings.timer});if(st.phase==='playing')return db.ref('gameState').update({phase:'reveal',revealEnd:Date.now()+2600});if(st.phase==='reveal')return db.ref('gameState').update({phase:'leaderboard',leaderboardStartTime:Date.now(),leaderboardEnd:Date.now()+settings.photoTime*1000});if(st.phase==='leaderboard'){const list=selectedList(st),ni=(st.currentQuestion||0)+1;if(ni>=list.length)return db.ref('gameState').update({phase:'finished',finishedAt:Date.now()});return clearAnswered().then(()=>db.ref('gameState').update({phase:'playing',currentQuestion:ni,questionStartTime:Date.now(),questionDuration:settings.timer,photoIndex:photos.length?(st.photoIndex||0)+1:0}))}if(st.phase==='finished')return resetGame()}
function clearPlayers(){if(confirm('Remove ALL players?'))db.ref('players').remove().then(()=>toast('Players cleared'))}
function renderPhase(){const st=state||{phase:'lobby',currentQuestion:0};$('sPhase').textContent=st.phase?st.phase[0].toUpperCase()+st.phase.slice(1):'Lobby';$('phaseBig').textContent=($('sPhase').textContent||'Lobby');const list=selectedList(st);const guests=players.filter(x=>!x.isHost),answered=guests.filter(x=>x.answered).length;let meta='Ready to start.';if(st.phase==='countdown')meta=`Countdown · ${guests.length} players`;if(st.phase==='playing')meta=`Question ${st.currentQuestion+1}/${list.length||st.totalQuestions||'?'} · ${answered}/${guests.length} answered`;if(st.phase==='reveal')meta='Reveal answer';if(st.phase==='leaderboard')meta='Standings / fun photo';if(st.phase==='finished')meta='Game complete';$('phaseMeta').textContent=meta}
window.kickPlayer=id=>{if(confirm('Kick this player?'))db.ref('players/'+id).remove().then(()=>toast('Player kicked'))};
function renderLive(){$('live').innerHTML=players.length?players.map(x=>`<div class="player"><b>${esc(displayName(x.name))}</b> ${x.isHost?'<span class="pill ok">HOST</span>':''}<br><span class="muted">Score:</span> <b>${x.score||0}</b>${x.streak>1?` <span class="pill ok">🔥${x.streak}</span>`:''}<br><span class="muted">${x.answered?'✓ Answered':'⏳ Waiting'}</span> ${x.isHost?'':`<button class="btn small red" style="margin-top:8px" onclick="kickPlayer('${x.id}')">Kick</button>`}</div>`).join(''):'<div class="empty">No players connected.</div>'}
window.addEventListener('load',wire);
</script></body></html>
